name: CI/CD Deploy to Render

on:
  push:
    branches: [main]
jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install & Typecheck
        run: |
          npm install
          npx prisma db pull
          npx prisma generate
          npm run build

      - name: Trigger Render Deploy
        run: curl -X POST ${{ secrets.RENDER_DEPLOY_HOOK_URL }}
